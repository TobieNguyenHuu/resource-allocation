server:
  port: 8080

spring:
  application:
    name: resource-allocation

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resource_allocation}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # Schema được tạo bằng SQL script thủ công (db/schema.sql) — deliverable §9 PRD.
  # Hibernate KHÔNG sinh DDL, chỉ validate ánh xạ Entity ⇄ bảng (ddl-auto: validate).
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      continue-on-error: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

# Actuator: chỉ expose health/info (đủ cho health-check của Docker & story 1.1/1.4).
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.company.resourceallocation: INFO
