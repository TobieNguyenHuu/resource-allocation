services:
  db:
    image: postgres:16
    container_name: ra-postgres
    environment:
      POSTGRES_DB: resource_allocation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ra-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resource_allocation"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: ra-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/resource_allocation
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"

volumes:
  ra-db-data:
